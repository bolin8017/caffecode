name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          TELEGRAM_BOT_TOKEN: placeholder
          TELEGRAM_BOT_USERNAME: placeholder
          TELEGRAM_WEBHOOK_SECRET: placeholder
          LINE_CHANNEL_ACCESS_TOKEN: placeholder
          LINE_CHANNEL_SECRET: placeholder
          LINE_BOT_BASIC_ID: placeholder

      - name: Type check
        run: pnpm --filter @caffecode/shared --filter @caffecode/web exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @caffecode/web lint

      - name: Test shared (with coverage)
        run: pnpm --filter @caffecode/shared test:coverage

      - name: Test web (with coverage)
        run: pnpm --filter @caffecode/web test:coverage

      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const thresholds = {
              shared: { stmts: 95, branch: 90, funcs: 95, lines: 95 },
              web:    { stmts: 90, branch: 85, funcs: 90, lines: 90 },
            };
            const paths = [
              ['shared', 'packages/shared/coverage/coverage-summary.json'],
              ['web',    'apps/web/coverage/coverage-summary.json'],
            ];
            function fmt(pct, min) {
              const pass = pct >= min;
              return `${pct}% ${pass ? '✅' : '❌'} (≥${min}%)`;
            }
            const rows = paths.map(([name, path]) => {
              try {
                const t = JSON.parse(fs.readFileSync(path, 'utf8')).total;
                const th = thresholds[name];
                return `| ${name} | ${fmt(t.statements.pct, th.stmts)} | ${fmt(t.branches.pct, th.branch)} | ${fmt(t.functions.pct, th.funcs)} | ${fmt(t.lines.pct, th.lines)} |`;
              } catch {
                return `| ${name} | - | - | - | - |`;
              }
            }).join('\n');
            const body = [
              '## 📊 Coverage Report',
              '',
              '| Package | Statements | Branches | Functions | Lines |',
              '|---------|-----------|----------|-----------|-------|',
              rows,
              '',
              '<sub>🤖 Generated by CI · thresholds enforced via vitest</sub>',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith('## 📊 Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
